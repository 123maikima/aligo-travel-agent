name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint critical errors
        run: ruff check --select E9,F63,F7,F82 travel_agent/ tests/

      - name: Unit tests
        env:
          ALLOW_INSECURE_STARTUP: "true"
        run: pytest -q -m "not llm and not network and not rag"
